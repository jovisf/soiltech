services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: soiltech
      POSTGRES_PASSWORD: soiltech
      POSTGRES_DB: soiltech
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U soiltech"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5
